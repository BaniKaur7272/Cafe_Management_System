<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Table Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #6e2c00;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 30px 50px;
        }

        .add-table {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .add-table input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 250px;
        }

        .add-table button {
            background: #6e2c00;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-table button:hover {
            background: #7c3b10;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .table-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: bold;
        }

        .status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .available {
            background: #e6f6ec;
            color: #2ecc71;
        }

        .unavailable {
            background: #fdeaea;
            color: #e74c3c;
        }

        .reserved {
            background: #fff3cd;
            color: #d4a017;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .actions button {
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            cursor: pointer;
        }

        .actions button:hover {
            background: #ececec;
        }

        .delete-btn {
            background: #ffe6e6;
            color: #c0392b;
            border: 1px solid #e0a0a0;
        }

        .delete-btn:hover {
            background: #ffcccc;
        }

        .back-btn {
            margin: 20px 40px;
            display: inline-block;
            text-decoration: none;
            color: white;
            background: #6e2c00;
            padding: 8px 14px;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #793202;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Table Management</h1>
    </div>

    <a class="back-btn" href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

    <div class="container">

        <!-- Add Table -->
        <form class="add-table" method="post" action="/add_table">
            <input type="number" name="table_number" placeholder="Table number (e.g. 7)" required>
            <button type="submit">+ Add Table</button>
        </form>

        <!-- Table Cards -->
        <div class="table-grid">

            {% for table in tables %}
            <div class="table-card">

                <div class="table-header">
                    <div class="table-title">Table {{ table.table_number }}</div>

                    <div class="status {{ table.status }}">
                        {{ table.status }}
                    </div>
                </div>

                <div class="actions">

                    <!-- Toggle -->
                    <form action="/toggle_table/{{ table.table_number }}" method="post">
                        <button type="submit">
                            {% if table.status == "available" %}
                            Set Unavailable
                            {% else %}
                            Set Available
                            {% endif %}
                        </button>
                    </form>

                    <!-- Delete -->
                    <form action="/delete_table/{{ table.table_number }}" method="post"
                        onsubmit="return confirm('Delete this table permanently?');">
                        <button type="submit" class="delete-btn">
                            Delete
                        </button>
                    </form>

                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</body>

</html>
