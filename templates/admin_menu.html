<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin - Menu Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #6e2c00;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .top-bar {
            padding: 20px;
            text-align: right;
        }

        .add-btn {
            background: #2e7d32;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
        }

        .add-btn:hover {
            background: #1b5e20;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px 40px 40px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .price {
            font-weight: bold;
            margin: 5px 0;
        }

        .actions a {
            margin: 5px;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            color: white;
        }

        .edit {
            background: #1565c0;
        }

        .delete {
            background: #c62828;
        }

        .back-btn {
            margin: 20px;
            display: inline-block;
            text-decoration: none;
            color: white;
            background: #444;
            padding: 8px 14px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Menu Management</h1>
    </div>

    <div class="top-bar">
        <a class="add-btn" href="{{ url_for('add_item') }}">+ Add New Item</a>
    </div>

    <a class="back-btn" href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>

    <div class="container">
        {% for item in items %}
        {% set upload_path = 'uploads/' + item.image %}
        {% set image_path = 'images/' + item.image %}
        <div class="card">
            <img src="{{ url_for('static', filename=upload_path) }}"
                onerror="fallbackImage(this, '{{ url_for('static', filename=image_path) }}')" 
                alt="{{ item.name }}">

            <div class="card-body">
                <h3>{{ item.name }}</h3>
                <div class="price">₹{{ item.price }}</div>
                <p>Stock: {{ item.stock }}</p>

                <div class="actions">
                    <a class="edit" href="{{ url_for('edit_item', item_id=item.id) }}">Edit</a>
                    <a class="delete" href="{{ url_for('delete_item', item_id=item.id) }}">Delete</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function fallbackImage(img, fallbacksrc){
            img.onerror = null;
            img.src = fallbacksrc
        }
    </script>

</body>

</html>
