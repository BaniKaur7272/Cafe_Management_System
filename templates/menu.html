{% extends "base.html" %}

{% block content %}

<style>

.page{
display:flex;
gap:10px;
text-align: center;
text-shadow: 5px,solid,black;
padding:20px;
}

/* MENU GRID */

.menu-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
flex:3;
}

.menu-card{
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:0.2s;
}

.menu-card:hover{
transform:scale(1.03);
}

.menu-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.menu-card h3{
margin-top:10px;
}

.add-btn{
background:#6b3e26;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

/* CART */

.cart-panel{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
height:fit-content;
}

.cart-panel h2{
margin-bottom:10px;
}

.place-btn{
background:#28a745;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

</style>


<div class="page">

<!-- MENU -->

<h2>Our Menu</h2>

<br><br>

<div class="menu-container">

{% for item in items %}

<div class="menu-card">

<img src="{{ url_for('static', filename='images/' + item.image) }}">

<h3>{{ item.name }}</h3>

<p>{{ item.category }}</p>

<p><b>₹{{ item.price }}</b></p>

<p>Stock: {{ item.stock }}</p>

<button class="add-btn"
onclick="addToCart('{{ item.name }}', {{ item.price }})">
Add
</button>

</div>

{% endfor %}

</div>



<!-- CART -->

<div class="cart-panel">

<h2>Your Order</h2>

<label>Select Table</label>

<select id="table">

{% for table in tables %}

<option value="{{table.table_number}}">
Table {{table.table_number}}
</option>

{% endfor %}

</select>


<h3>Cart</h3>

<ul id="cart-items"></ul>

<h3>Total ₹<span id="total">0</span></h3>


<form action="/place_order" method="POST">

<input type="hidden" name="items" id="items">
<input type="hidden" name="total_price" id="total_price">

<button class="place-btn">Place Order</button>

</form>

</div>


</div>



<script>

let cart = []
let total = 0

function addToCart(name,price){

cart.push({name:name, price:price})

total += price

updateCart()

}

function updateCart(){

let cartList = document.getElementById("cart-items")

cartList.innerHTML=""

cart.forEach(item => {

let li=document.createElement("li")

li.innerText = item.name + " - ₹" + item.price

cartList.appendChild(li)

})

document.getElementById("total").innerText = total

document.getElementById("items").value = JSON.stringify(cart)

document.getElementById("total_price").value = total

document.getElementById("search").addEventListener("keyup", function(){

let value = this.value.toLowerCase()

let items = document.querySelectorAll(".menu-card")

items.forEach(item => {

let name = item.innerText.toLowerCase()

if(name.includes(value)){
item.style.display="block"
}
else{
item.style.display="none"
}

})
})
}
</script>



{% endblock %}
