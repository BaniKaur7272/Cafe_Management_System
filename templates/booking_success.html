<!DOCTYPE html>
<html>
<head>
<title>Table Reserved</title>

<style>
body{
font-family:Arial;
text-align:center;
padding-top:100px;
}

.box{
border:1px solid #ddd;
padding:40px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px #ccc;
}

button{
padding:10px 20px;
background:#27ae60;
border:none;
color:white;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>🎉 Table Reserved Successfully</h2>

<p><b>Name:</b> {{name}}</p>
<p><b>Table:</b> {{table}}</p>
<p><b>Date:</b> {{date}}</p>
<p><b>Time:</b> {{time}}</p>

<br>

<a href="/menu">
<button>Order Food</button>
</a>

</div>

</body>
</html>
