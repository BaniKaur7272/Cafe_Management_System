<!DOCTYPE html>
<html>

<head>
    <title>Cafe Manager Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        .left {
            width: 50%;
            background: linear-gradient(135deg, #220e01, #964B00);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #eee;
        }

        .role-buttons button.active {
            background: #411900;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .login-box p {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 15px;
        }

        .login-box a {
            color: #964B00;
            text-decoration: none;
            font-weight: bold;
        }

        .login-box a:hover {
            color: #411900;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="left">

        <img src="{{ url_for('static', filename='images/banner.jpg') }}" class="hero-img">

        <h1>Welcome to Cafe Manager</h1>

        <p>
            Manage orders, tables and staff easily with our smart cafe management system.
        </p>
        <br>

    </div>

    <div class="right">

        <div class="login-box">

            <h2>Sign In</h2>

            <form method="POST" action="/">

                <div class="role-buttons">

                    <button type="button" onclick="setRole('admin')" id="adminBtn">Admin</button>
                    <button type="button" onclick="setRole('staff')" id="staffBtn">Staff</button>
                    <button type="button" onclick="setRole('customer')" id="customerBtn">Customer</button>

                </div>

                <input type="hidden" name="role" id="role" value="admin">

                <input type="email" name="email" placeholder="Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <button class="login-btn">Login</button>
                <p>Not have an account? <a href="signup">Sign In</a></p>

            </form>

        </div>

    </div>

    <script>

        function setRole(role) {

            document.getElementById("role").value = role;

            document.getElementById("adminBtn").classList.remove("active");
            document.getElementById("staffBtn").classList.remove("active");
            document.getElementById("customerBtn").classList.remove("active");

            document.getElementById(role + "Btn").classList.add("active");

        }

        setRole("admin")

    </script>

</body>

</html>
