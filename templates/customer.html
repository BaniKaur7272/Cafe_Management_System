<!DOCTYPE html>
<html>
<head>
<title>Customer Panel</title>

<style>
body{
margin:0;
font-family:Arial;

background-image:url("/static/images/coffee1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

.header{
background:#814141;
color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:50px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
width:250px;
}

.card a{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background: #5C4033 ;
color:white;
text-decoration:none;
border-radius:5px;
}

</style>
</head>

<body>


<div class="header">
<h1>Customer Panel</h1>
</div>

<div class="container">

<div class="card">
<h2>Menu</h2>
<p>View food menu</p>
<a href="/menu">Open Menu</a>
</div>

<div class="card">
<h2>Place Order</h2>
<p>Order food from menu</p>
<a href="/menu">Order Now</a>
</div>

<div class="card">
<h2>Reserve Table</h2>
<p>Book table in advance</p>
<a href="/prebook">Reserve</a>
</div>

<div class="card">
<h2>Logout</h2>
<a href="/">Logout</a>
</div>

</div>
</body>
</html>
